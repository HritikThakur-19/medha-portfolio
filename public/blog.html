<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blog</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="blog-container">

    <!-- Blog Cover Image -->
    <img id="blog-image" class="blog-image" alt="Blog Image">

    <!-- Blog Title -->
    <h1 id="title"></h1>

    <!-- Blog Information -->
    <div class="blog-meta">

        <span id="author"></span> |

        <span id="category" class="category-badge"></span> |

        <span id="date"></span> |

        <span id="reading-time"></span>

    </div>

    <hr>

    <!-- Blog Content -->
    <div id="content"></div>
    <hr>

<h2>Related Articles</h2>

<div id="related-blogs"></div>

</div>

<script src="js/blog.js"></script>

</body>

</html>
